name: Nightly policy-value self training

on:
  schedule:
    - cron: "47 9 * * *"
  workflow_dispatch: {}

concurrency:
  group: model-training-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate games
        run: AZ_SELF_PLAY_GAMES=4 AZ_MCTS_SEARCHES=80 python ml/self_play.py

      - name: Continue policy-value learning and export model
        run: python ml/train_safe_export.py

      - name: Commit updated model state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          artifact_dir="$(mktemp -d)"
          mkdir -p "$artifact_dir/public" "$artifact_dir/ml/data" "$artifact_dir/ml/checkpoints"
          cp -a public/nn "$artifact_dir/public/"
          cp -a ml/checkpoints/. "$artifact_dir/ml/checkpoints/"
          cp -a ml/data/self_play_buffer.json "$artifact_dir/ml/data/self_play_buffer.json"
          cp -a ml/training_history.json "$artifact_dir/ml/training_history.json"

          git fetch origin master
          git reset --hard origin/master
          git clean -fd

          rm -rf public/nn ml/checkpoints
          mkdir -p public ml/checkpoints ml/data
          cp -a "$artifact_dir/public/nn" public/
          cp -a "$artifact_dir/ml/checkpoints/." ml/checkpoints/
          cp -a "$artifact_dir/ml/data/self_play_buffer.json" ml/data/self_play_buffer.json
          cp -a "$artifact_dir/ml/training_history.json" ml/training_history.json

          git add public/nn ml/checkpoints ml/data/self_play_buffer.json ml/training_history.json
          if git diff --cached --quiet; then
            echo "No model changes to commit"
            exit 0
          fi
          git commit -m "Nightly: continue self training"
          git push
