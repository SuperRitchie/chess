name: Nightly NN training

on:
  push:
    branches: [ master ]
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch: {}

concurrency:
  group: model-training-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Stockfish
        run: |
          sudo apt-get update
          sudo apt-get install -y stockfish
          which stockfish
        env:
          DEBIAN_FRONTEND: noninteractive
      - name: Fetch Lichess games
        run: python ml/fetch_lichess.py
      - name: Extract positions
        run: python ml/extract_positions.py
      - name: Evaluate with Stockfish
        run: SF_DEPTH=12 STOCKFISH_PATH=stockfish python ml/stockfish_eval.py
      - name: Continue NN learning + export TFJS
        run: python ml/train_safe_export.py
      - name: Commit updated brain and browser model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          artifact_dir="$(mktemp -d)"
          mkdir -p "$artifact_dir/public" "$artifact_dir/ml/data" "$artifact_dir/ml/checkpoints"
          cp -a public/nn "$artifact_dir/public/"
          cp -a ml/checkpoints/. "$artifact_dir/ml/checkpoints/"
          cp -a ml/data/replay_buffer.json "$artifact_dir/ml/data/replay_buffer.json"
          cp -a ml/training_history.json "$artifact_dir/ml/training_history.json"

          git fetch origin master
          git reset --hard origin/master
          git clean -fd

          mkdir -p public ml/checkpoints ml/data
          cp -a "$artifact_dir/public/nn" public/
          cp -a "$artifact_dir/ml/checkpoints/." ml/checkpoints/
          cp -a "$artifact_dir/ml/data/replay_buffer.json" ml/data/replay_buffer.json
          cp -a "$artifact_dir/ml/training_history.json" ml/training_history.json

          git add public/nn ml/checkpoints ml/data/replay_buffer.json ml/training_history.json
          if git diff --cached --quiet; then
            echo "No model changes to commit"
            exit 0
          fi
          git commit -m "Nightly: continue NN learning"
          git push
