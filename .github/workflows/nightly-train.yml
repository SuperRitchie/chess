name: Nightly NN training

on:
  push:
    branches: [ master ]
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch: {}

concurrency:
  group: model-training-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Stockfish
        run: |
          sudo apt-get update
          sudo apt-get install -y stockfish
          which stockfish
        env:
          DEBIAN_FRONTEND: noninteractive
      - name: Fetch Lichess games
        run: python ml/fetch_lichess.py
      - name: Extract positions
        run: python ml/extract_positions.py
      - name: Evaluate with Stockfish
        run: SF_DEPTH=12 STOCKFISH_PATH=stockfish python ml/stockfish_eval.py
      - name: Continue NN learning + export TFJS
        run: |
          set -o pipefail
          python ml/train_safe_export.py 2>&1 | sed \
            -e '/ydf\.readthedocs\.io/d' \
            -e '/successor of TensorFlow Decision Forests/d' \
            -e '/failed to lookup keras version from the file/d' \
            -e '/this is likely a weight only file/d' \
            -e '/HDF5 file format is considered legacy/d'
      - name: Commit updated brain and browser model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/nn ml/checkpoints ml/data/replay_buffer.json ml/training_history.json
          if git diff --cached --quiet; then
            echo "No model changes to commit"
            exit 0
          fi
          git commit -m "Nightly: continue NN learning"
          git reset --hard HEAD
          git clean -fd
          git pull --rebase origin master
          git push
